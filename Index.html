<!DOCTYPE html>

    <style>
        body {
            background-color: #0E0F13;
            color: #E6EAF2;
            font-family: 'Times New Roman', Times, serif;
            margin: 0;
            padding: 40px 80px;
            transition: background-color 0.25s, color 0.25s;
        }

        body.light-mode {
            background-color: #F6F1E8;
            color: #1A1A1A;
        }

        a {
            text-decoration: none;
            color: #00F5D4;
            transition: 0.2s;
        }

        body.light-mode a {
            color: #005F73;
        }

        a:hover {
            color: #FF3D81;
        }

        h1 {
            font-size: 3em;
        }

        p, li {
            font-size: 2em;
        }

        .divider {
            height: 2px;
            background-color: #E6EAF2;
            margin: 40px 0;
            transition: background-color 0.25s;
        }

        body.light-mode .divider {
            background-color: #1A1A1A;
        }

        svg {
            fill: white;
            width: 20%;
            height: auto;
            padding: 0;
            transition: fill 0.2s;
        }

        .logo:hover svg {
            fill: #00F5D4;
        }

        .logo:active svg {
            fill: #FF3D81;
        }

        .mode-toggle {
            background: none;
            border: 2px solid currentColor;
            color: inherit;
            border-radius: 999px;
            padding: 10px 14px;
            cursor: pointer;
            margin-bottom: 24px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font: inherit;
            transition: background-color 0.25s, color 0.25s, transform 0.2s;
        }

        .mode-toggle:hover {
            transform: translateY(-2px);
        }

        .mode-toggle svg {
            width: 28px;
            height: 28px;
            fill: currentColor;
        }
    </style>
</head>
